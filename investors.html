<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Investor Portal — Grupo Franklin.">
  <link rel="icon" href="data:,">
  <title>Investor Portal — Grupo Franklin</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .portal-section {
      min-height: calc(100vh - 125px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .login-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
    }

    .login-card h1 {
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 10px;
    }

    .login-card > p {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.65;
      margin-bottom: 32px;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .login-form input {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    .login-form input:focus { border-color: var(--gold); outline: 2px solid var(--gold); outline-offset: 0; }
    .login-form input::placeholder { color: var(--text-muted); }

    .login-form button {
      background: var(--gold);
      color: var(--bg-secondary);
      border: none;
      border-radius: 3px;
      padding: 13px;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.2s;
    }

    .login-form button:hover { opacity: 0.85; }

    .login-error {
      display: none;
      background: rgba(184, 150, 46, 0.06);
      border: 1px solid rgba(184, 150, 46, 0.25);
      border-radius: 3px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.65;
    }

    .login-error a {
      color: var(--gold);
      text-decoration: none;
    }

    .login-error a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">
      <img src="Resources/Grupo%20Franklin%20Logo%20White%20no%20Background.png" alt="Grupo Franklin">
    </a>
    <button class="nav-toggle" aria-label="Toggle menu" onclick="toggleNav()">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li class="investors-link"><a href="investors.html">Investors</a></li>
    </ul>
  </nav>

  <main>
    <div class="portal-section">
      <div class="login-card">
        <h1>Investor Portal</h1>
        <p>Access your investor documents and reports.</p>
        <form class="login-form" id="login-form">
          <input type="email"    placeholder="Email address" autocomplete="email"             required>
          <input type="password" placeholder="Password"      autocomplete="current-password"  required>
          <button type="submit">Sign In</button>
          <div class="login-error" id="login-error">
            Incorrect email or password combination. Please contact
            <a href="mailto:investorrelations@grupofranklin.com">investorrelations@grupofranklin.com</a>.
          </div>
        </form>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Grupo Franklin &middot; All rights reserved</p>
  </footer>

  <script>
    function toggleNav() {
      document.getElementById('nav-links').classList.toggle('open');
    }

    document.getElementById('login-form').addEventListener('submit', function (e) {
      e.preventDefault();
      document.getElementById('login-error').style.display = 'block';
    });
  </script>
</body>
</html>
